guardrails:
  - id: emergency_escalation
    description: Auto-escalate life-safety emergencies
    trigger: triage_result.urgency == "emergency"
    emergency_keywords: ["gas leak", "gas smell", "fire", "smoke", "flood", "burst pipe",
                         "electrical sparks", "carbon monoxide", "structural collapse"]
    actions:
      - if emergency_keyword in tenant_report:
          escalate_to: [911_dispatch, property_manager_phone, owner_phone]
          vendor_dispatch: immediately find available emergency vendor
          override: bypass normal quote process, use emergency vendor rates
      - if urgency == "emergency" AND no life_safety_keyword:
          escalate_to: [property_manager_sms, owner_email]
          vendor_dispatch: within 1 hour
    state_compliance:
      max_response_hours: lookup(property.state, state_habitability_laws)
      timer_start: timestamp(tenant_report_received)
      escalate_if: timer > max_response_hours - 2 hours
